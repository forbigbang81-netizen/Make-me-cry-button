<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Edgerunners Portal</title>
    <style>
        /* Minimalist All-Black Canvas */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        #loading-panel {
            text-align: center;
            font-size: 1.1rem;
            color: #666666;
            margin-top: 50px;
        }

        /* Hero Card Node */
        .anime-card {
            display: flex;
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            gap: 24px;
            transition: border-color 0.2s, background 0.2s;
            margin-top: 50px;
        }

        .anime-card:hover {
            background: #0c0c0c;
            border-color: #333333;
        }

        .poster-frame {
            flex-shrink: 0;
            width: 180px;
            height: 260px;
            border-radius: 4px;
            overflow: hidden;
            background: #111111;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .anime-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .action-hint {
            color: #007aff;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Seamless Subpage Overlay Layout */
        .subpage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .subpage-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
        }

        .back-btn:hover {
            color: #ffffff;
        }

        /* Plain Action Button */
        .cry-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 40px;
        }

        .cry-btn:hover {
            opacity: 0.9;
        }

        /* Standard 1:1 Scale Framing Layout */
        .video-window-wrapper {
            display: none;
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 40px auto 0 auto;
            padding-top: 56.25%; /* Perfect 16:9 Aspect Ratio */
            background: #000000;
            border-radius: 6px;
            overflow: hidden;
        }

        /* Clean un-zoomed sizing matrix */
        .video-window-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Blocks accidental mobile click overlays */
        }

        @media (max-width: 600px) {
            .anime-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-panel">Connecting to data stream...</div>

        <div id="anime-card" class="anime-card" style="display: none;" onclick="openSubpage()">
            <div class="poster-frame">
                <img id="api-image" src="" alt="Cyberpunk Edgerunners">
            </div>
            <div class="card-info">
                <h2 class="anime-title">Cyberpunk Edgerunners</h2>
                <div class="action-hint">Click to view page →</div>
            </div>
        </div>
    </div>

    <div id="details-subpage" class="subpage">
        <div class="subpage-content">
            <button class="back-btn" onclick="closeSubpage()">← Back</button>
            
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Cyberpunk Edgerunners</h1>
            
            <button id="cry-action-btn" class="cry-btn" onclick="playCleanVideo()">Make Me Cry</button>
            
            <div id="player-wrapper" class="video-window-wrapper">
                <div id="api-player-node"></div>
            </div>
        </div>
    </div>

    <script>
        const VIDEO_ID = "KvMY1uzSC1E";
        let playerInstance = null;

        // Load the API core package script
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        document.addEventListener("DOMContentLoaded", () => {
            fetchPosterAsset();
        });

        // Pulls exclusively through Kitsu Open API to load the correct cover art smoothly
        async function fetchPosterAsset() {
            try {
                const response = await fetch('https://kitsu.io/api/edge/anime?filter[slug]=cyberpunk-edgerunners');
                if (!response.ok) throw new Error('API line disconnected');
                
                const json = await response.json();
                const animeData = json.data[0].attributes;

                document.getElementById('api-image').src = animeData.posterImage.medium;
                
                document.getElementById('loading-panel').style.display = 'none';
                document.getElementById('anime-card').style.display = 'flex';
            } catch (err) {
                document.getElementById('loading-panel').innerText = 'Failed to load Cyberpunk Edgerunners data.';
                console.error(err);
            }
        }

        function openSubpage() {
            document.getElementById('details-subpage').style.display = 'block';
        }

        function closeSubpage() {
            document.getElementById('details-subpage').style.display = 'none';
            
            if (playerInstance && typeof playerInstance.destroy === 'function') {
                playerInstance.destroy();
                playerInstance = null;
            }

            document.getElementById('player-wrapper').style.display = 'none';
            document.getElementById('cry-action-btn').style.display = 'inline-block';
        }

        function playCleanVideo() {
            document.getElementById('cry-action-btn').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';

            // Custom native variables to strip away player panels at a clean 1:1 aspect ratio
            playerInstance = new YT.Player('api-player-node', {
                videoId: VIDEO_ID,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'fs': 0,
                    'disablekb': 1,
                    'autohide': 1
                },
                events: {
                    'onReady': (event) => {
                        event.target.playVideo();
                    }
                }
            });
        }
    </script>
</body>
</html>
