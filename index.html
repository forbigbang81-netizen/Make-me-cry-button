<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Edgerunners Portal</title>
    <style>
        /* Minimalist All-Black Canvas */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        #loading-panel {
            text-align: center;
            font-size: 1.1rem;
            color: #666666;
            margin-top: 50px;
        }

        /* Hero Card Node */
        .anime-card {
            display: flex;
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            gap: 24px;
            margin-top: 50px;
            outline: none;
            transition: border-color 0.3s ease, background-color 0.3s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            animation: fadeIn 0.6s ease forwards;
        }

        .anime-card:hover {
            background: #0c0c0c;
            border-color: #333333;
            transform: translateY(-2px);
        }

        .poster-frame {
            flex-shrink: 0;
            width: 180px;
            height: 260px;
            border-radius: 4px;
            overflow: hidden;
            background: #111111;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .anime-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .action-hint {
            color: #007aff;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Seamless Subpage Overlay Layout */
        .subpage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .subpage-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
            outline: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .back-btn:hover {
            color: #ffffff;
            transform: translateX(-3px);
        }

        .cry-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            margin-top: 40px;
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .cry-btn:hover {
            opacity: 0.95;
            transform: scale(1.04);
        }

        /* 100% Custom Video Player Layout */
        .custom-player-wrapper {
            display: none;
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 40px auto 0 auto;
            background: #000000;
            border: 1px solid #222222;
            border-radius: 8px;
            overflow: hidden;
            animation: expandVideo 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Fully Custom Control Bar Interface */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 20;
        }

        .custom-player-wrapper:hover .player-controls {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-pause-btn, .mute-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
        }

        .time-display {
            font-size: 0.85rem;
            color: #aaaaaa;
            font-variant-numeric: tabular-nums;
        }

        /* Custom Styled Timelines and Ranges */
        .progress-bar-container {
            width: 100%;
            height: 5px;
            background: #333333;
            cursor: pointer;
            position: relative;
            border-radius: 2px;
        }

        .progress-filled {
            height: 100%;
            background: #007aff;
            width: 0%;
            border-radius: 2px;
        }

        .volume-slider {
            width: 70px;
            -webkit-appearance: none;
            background: #333333;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandVideo {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .anime-card { flex-direction: column; align-items: center; text-align: center; }
            .player-controls { opacity: 1; background: rgba(0,0,0,0.6); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-panel">Connecting to data stream...</div>

        <div id="anime-card" class="anime-card" style="display: none;" onclick="openSubpage()">
            <div class="poster-frame">
                <img id="api-image" src="" alt="Cyberpunk Edgerunners">
            </div>
            <div class="card-info">
                <h2 class="anime-title">Cyberpunk Edgerunners</h2>
                <div class="action-hint">Click to view page →</div>
            </div>
        </div>
    </div>

    <div id="details-subpage" class="subpage">
        <div class="subpage-content">
            <button class="back-btn" onclick="closeSubpage()">← Back</button>
            
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Cyberpunk Edgerunners</h1>
            
            <button id="cry-action-btn" class="cry-btn" onclick="playCleanVideo()">Make Me Cry</button>
            
            <div id="player-wrapper" class="custom-player-wrapper">
                <video id="custom-video-node" playsinline>
                    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                </video>
                
                <div class="player-controls">
                    <div class="progress-bar-container" id="progress-container">
                        <div class="progress-filled" id="progress-fill"></div>
                    </div>
                    <div class="controls-row">
                        <div class="left-controls">
                            <button class="play-pause-btn" id="play-btn">▶</button>
                            <div class="time-display"><span id="current-time">0:00</span> / <span id="duration-time">0:00</span></div>
                        </div>
                        <div class="right-controls">
                            <button class="mute-btn" id="mute-btn">🔊</button>
                            <input type="range" class="volume-slider" id="volume-bar" min="0" max="1" step="0.1" value="1">
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const video = document.getElementById('custom-video-node');
        const playBtn = document.getElementById('play-btn');
        const muteBtn = document.getElementById('mute-btn');
        const volumeBar = document.getElementById('volume-bar');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationTimeDisplay = document.getElementById('duration-time');

        document.addEventListener("DOMContentLoaded", () => {
            fetchPosterAsset();
            setupCustomPlayer();
        });

        async function fetchPosterAsset() {
            try {
                const response = await fetch('https://kitsu.io/api/edge/anime?filter[slug]=cyberpunk-edgerunners');
                if (!response.ok) throw new Error('API line disconnected');
                const json = await response.json();
                document.getElementById('api-image').src = json.data[0].attributes.posterImage.medium;
                document.getElementById('loading-panel').style.display = 'none';
                document.getElementById('anime-card').style.display = 'flex';
            } catch (err) {
                document.getElementById('loading-panel').innerText = 'Failed to load Cyberpunk Edgerunners data.';
            }
        }

        function openSubpage() {
            const subpage = document.getElementById('details-subpage');
            subpage.style.opacity = '0';
            subpage.style.display = 'block';
            let opacity = 0;
            const fade = setInterval(() => {
                if (opacity >= 1) clearInterval(fade);
                else subpage.style.opacity = (opacity += 0.1);
            }, 15);
        }

        function closeSubpage() {
            document.getElementById('details-subpage').style.display = 'none';
            video.pause();
            document.getElementById('player-wrapper').style.display = 'none';
            document.getElementById('cry-action-btn').style.display = 'inline-block';
        }

        function playCleanVideo() {
            document.getElementById('cry-action-btn').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';
            video.play().catch(() => console.log("Autoplay paused. User click requested."));
            playBtn.innerText = '⏸';
        }

        /* Custom Player System Event Logic Bindings */
        function setupCustomPlayer() {
            playBtn.addEventListener('click', () => {
                if (video.paused) { video.play(); playBtn.innerText = '⏸'; }
                else { video.pause(); playBtn.innerText = '▶'; }
            });

            video.addEventListener('timeupdate', () => {
                const percentage = (video.currentTime / video.duration) * 100;
                progressFill.style.width = `${percentage}%`;
                currentTimeDisplay.innerText = formatTime(video.currentTime);
            });

            video.addEventListener('loadedmetadata', () => {
                durationTimeDisplay.innerText = formatTime(video.duration);
            });

            progressContainer.addEventListener('click', (e) => {
                const scrubTime = (e.offsetX / progressContainer.offsetWidth) * video.duration;
                video.currentTime = scrubTime;
            });

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                muteBtn.innerText = video.muted ? '🔇' : '🔊';
            });

            volumeBar.addEventListener('input', (e) => {
                video.volume = e.target.value;
                video.muted = e.target.value == 0;
                muteBtn.innerText = video.muted ? '🔇' : '🔊';
            });
        }

        function formatTime(time) {
            const mins = Math.floor(time / 60);
            const secs = Math.floor(time % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }
    </script>
</body>
</html>
