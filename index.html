<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Edgerunners Portal</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        /* Minimalist All-Black Canvas Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        #loading-panel {
            text-align: center;
            font-size: 1.1rem;
            color: #666666;
            margin-top: 50px;
        }

        /* Home View Card Component Layout */
        .anime-card {
            display: flex;
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            gap: 24px;
            margin-top: 50px;
            outline: none;
            transition: border-color 0.3s ease, background-color 0.3s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            animation: fadeIn 0.6s ease forwards;
        }

        .anime-card:hover {
            background: #0c0c0c;
            border-color: #333333;
            transform: translateY(-2px);
        }

        .poster-frame {
            flex-shrink: 0;
            width: 180px;
            height: 260px;
            border-radius: 4px;
            overflow: hidden;
            background: #111111;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .anime-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .action-hint {
            color: #007aff;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Subpage Modal Canvas Overlay Matrix */
        .subpage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .subpage-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
            outline: none;
            transition: color 0.2s ease;
        }

        .back-btn:hover { color: #ffffff; }

        .cry-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            margin-top: 40px;
            transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .cry-btn:hover {
            opacity: 0.95;
            transform: scale(1.04);
        }

        /* 1:1 Matched Cinematic Player UI Layout Matrix */
        .premium-player-canvas {
            display: none;
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 40px auto 0 auto;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            animation: expandVideo 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        video {
            width: 100%;
            display: block;
            object-fit: contain;
        }

        /* HUD Control Layer Interface */
        .hud-control-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .premium-player-canvas:hover .hud-control-layer {
            opacity: 1;
        }

        /* Top Bar Layout Matrix */
        .hud-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .hud-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* SVG Control Icons Styling Definitions */
        .hud-icon-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            padding: 5px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .hud-icon-btn:hover {
            opacity: 0.8;
        }

        .hud-icon-btn svg {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        .hud-video-title {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }

        .hud-header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Native Google Cast Component Tag Integration */
        google-cast-launcher {
            --connected-color: #007aff;
            --disconnected-color: #ffffff;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        /* Center Control Play State Matrix */
        .hud-center-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        .hud-icon-btn.secondary svg {
            width: 32px;
            height: 32px;
        }

        .hud-icon-btn.primary svg {
            width: 54px;
            height: 54px;
        }

        .hud-icon-btn:active {
            transform: scale(0.92);
        }

        /* Bottom Control Panel Layout Matrix */
        .hud-footer-column {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 12px;
        }

        /* Timeline Slider Component Row */
        .hud-timeline-row {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 15px;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
            font-weight: 500;
        }

        .timeline-slider-wrapper {
            flex-grow: 1;
            position: relative;
            height: 4px;
            background: rgba(255, 255, 255, 0.24);
            border-radius: 4px;
            cursor: pointer;
        }

        .timeline-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #e50914; /* Matched Anilab Red Accent Seekbar Color */
            width: 0%;
            border-radius: 4px;
        }

        .timeline-scrub-handle {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }

        .timeline-slider-wrapper:hover .timeline-scrub-handle {
            transform: translate(-50%, -50%) scale(1.25);
        }

        /* System Action Options Row */
        .hud-options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .hud-options-left, .hud-options-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* Keyframe Curves */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes expandVideo {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .anime-card { flex-direction: column; align-items: center; text-align: center; }
            .hud-control-layer { opacity: 1; background: rgba(0,0,0,0.45); }
            .hud-video-title { max-width: 200px; font-size: 1rem; }
            .hud-center-row { gap: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-panel">Connecting to database asset track...</div>

        <div id="anime-card" class="anime-card" style="display: none;" onclick="openSubpage()">
            <div class="poster-frame">
                <img id="api-image" src="" alt="Cyberpunk Edgerunners">
            </div>
            <div class="card-info">
                <h2 class="anime-title">Cyberpunk Edgerunners</h2>
                <div class="action-hint">Click to view page →</div>
            </div>
        </div>
    </div>

    <div id="details-subpage" class="subpage">
        <div class="subpage-content">
            <button class="back-btn" onclick="closeSubpage()">← Back to Overview</button>
            
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Cyberpunk Edgerunners</h1>
            
            <button id="cry-action-btn" class="cry-btn" onclick="playCleanVideo()">Make Me Cry</button>
            
            <div id="player-wrapper" class="premium-player-canvas">
                <video id="video-node" playsinline src="https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"></video>
                
                <div class="hud-control-layer">
                    
                    <div class="hud-header-row">
                        <div class="hud-header-left">
                            <button class="hud-icon-btn" onclick="closeSubpage()">
                                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                            </button>
                            <div class="hud-video-title" id="player-title">Cyberpunk: Edgerunners | "I Really Want to Stay At Your House"</div>
                        </div>
                        <div class="hud-header-right">
                            <button class="hud-icon-btn">
                                <svg viewBox="0 0 24 24"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 7h-4v2h4v-2zm-6 0H4v2h8v-2zm6 4h-4v2h4v-2zm-6 0H4v2h8v-2z"/></svg>
                            </button>
                            <google-cast-launcher></google-cast-launcher>
                        </div>
                    </div>

                    <div class="hud-center-row">
                        <button class="hud-icon-btn secondary" id="skip-back-btn">
                            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button class="hud-icon-btn primary" id="master-play-btn">
                            <svg id="play-icon-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button class="hud-icon-btn secondary" id="skip-forward-btn">
                            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg>
                        </button>
                    </div>

                    <div class="hud-footer-column">
                        <div class="hud-timeline-row">
                            <span id="timestamp-current">00:00</span>
                            <div class="timeline-slider-wrapper" id="timeline-track">
                                <div class="timeline-progress-fill" id="timeline-progress"></div>
                                <div class="timeline-scrub-handle" id="timeline-handle"></div>
                            </div>
                            <span id="timestamp-duration">00:00</span>
                        </div>
                        
                        <div class="hud-options-row">
                            <div class="hud-options-left">
                                <button class="hud-icon-btn" id="lock-btn">
                                    <svg viewBox="0 0 24 24"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2.9 2-2 2zm6-5V9c0-3.31-2.69-6-6-6S6 5.69 6 9v3c-1.1s-1 2-1 2v5c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-5c0-1.1-.9-2-1-2zm-6-7c1.66 0 3 1.34 3 3v3H9V8c0-1.66 1.34-3 3-3z"/></svg>
                                </button>
                                <button class="hud-icon-btn" id="volume-btn">
                                    <svg id="volume-icon-svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                </button>
                            </div>
                            <div class="hud-options-right">
                                <button class="hud-icon-btn" id="fullscreen-btn">
                                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        const video = document.getElementById('video-node');
        const masterPlayBtn = document.getElementById('master-play-btn');
        const playIconSvg = document.getElementById('play-icon-svg');
        const timelineTrack = document.getElementById('timeline-track');
        const timelineProgress = document.getElementById('timeline-progress');
        const timelineHandle = document.getElementById('timeline-handle');
        const timestampCurrent = document.getElementById('timestamp-current');
        const timestampDuration = document.getElementById('timestamp-duration');
        const volumeBtn = document.getElementById('volume-btn');
        const volumeIconSvg = document.getElementById('volume-icon-svg');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        // SVG Path definitions for runtime icon mutation switches
        const PLAY_PATH = '<path d="M8 5v14l11-7z"/>';
        const PAUSE_PATH = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        const VOLUME_ON_PATH = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
        const VOLUME_MUTE_PATH = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

        document.addEventListener("DOMContentLoaded", () => {
            fetchPosterAsset();
            initializeControlEngine();
            initializeCastReceiver();
        });

        async function fetchPosterAsset() {
            try {
                const response = await fetch('https://kitsu.io/api/edge/anime?filter[slug]=cyberpunk-edgerunners');
                if (!response.ok) throw new Error('API line disconnected');
                const json = await response.json();
                document.getElementById('api-image').src = json.data[0].attributes.posterImage.medium;
                document.getElementById('loading-panel').style.display = 'none';
                document.getElementById('anime-card').style.display = 'flex';
            } catch (err) {
                document.getElementById('loading-panel').innerText = 'Failed to load Cyberpunk Edgerunners data.';
            }
        }

        function initializeControlEngine() {
            masterPlayBtn.addEventListener('click', togglePlaybackState);
            video.addEventListener('click', togglePlaybackState);

            video.addEventListener('timeupdate', () => {
                const progressRatio = video.currentTime / video.duration;
                const percentage = progressRatio * 100;
                
                timelineProgress.style.width = `${percentage}%`;
                timelineHandle.style.left = `${percentage}%`;
                timestampCurrent.innerText = convertSecondsToTimestamp(video.currentTime);
            });

            video.addEventListener('loadedmetadata', () => {
                timestampDuration.innerText = convertSecondsToTimestamp(video.duration);
            });

            timelineTrack.addEventListener('click', (event) => {
                const rect = timelineTrack.getBoundingClientRect();
                const clickPositionRatio = (event.clientX - rect.left) / rect.width;
                video.currentTime = clickPositionRatio * video.duration;
            });

            volumeBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                volumeIconSvg.innerHTML = video.muted ? VOLUME_MUTE_PATH : VOLUME_ON_PATH;
            });

            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.getElementById('player-wrapper').requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });

            document.getElementById('skip-forward-btn').addEventListener('click', () => video.currentTime += 10);
            document.getElementById('skip-back-btn').addEventListener('click', () => video.currentTime -= 10);
        }

        function togglePlaybackState() {
            if (video.paused) {
                video.play();
                playIconSvg.innerHTML = PAUSE_PATH;
            } else {
                video.pause();
                playIconSvg.innerHTML = PLAY_PATH;
            }
        }

        function convertSecondsToTimestamp(totalSeconds) {
            if (isNaN(totalSeconds)) return "00:00";
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        // Initialize Google Chromecast Sender Session Hooks
        function initializeCastReceiver() {
            window.__onGCastApiAvailable = function(isAvailable) {
                if (isAvailable) {
                    const context = cast.framework.CastContext.getInstance();
                    context.setOptions({
           receiverApplicationId: chrome.cast.media.DEFAULT_RECEIVER_APPLICATION_ID,
                        autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                    });
                }
            };
        }

        function openSubpage() {
            const subpage = document.getElementById('details-subpage');
            subpage.style.opacity = '0';
            subpage.style.display = 'block';
            let opacity = 0;
            const fade = setInterval(() => {
                if (opacity >= 1) clearInterval(fade);
                else subpage.style.opacity = (opacity += 0.1);
            }, 15);
        }

        function closeSubpage() {
            document.getElementById('details-subpage').style.display = 'none';
            video.pause();
            playIconSvg.innerHTML = PLAY_PATH;
            document.getElementById('player-wrapper').style.display = 'none';
            document.getElementById('cry-action-btn').style.display = 'inline-block';
        }

        function playCleanVideo() {
            document.getElementById('cry-action-btn').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';
            video.play().catch(() => console.log("Autoplay context pending user interaction."));
            playIconSvg.innerHTML = PAUSE_PATH;
        }
    </script>
</body>
</html>
