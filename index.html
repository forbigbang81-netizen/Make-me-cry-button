<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Edgerunners Portal</title>
    <style>
        /* Plain Black Background Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        #loading-panel {
            text-align: center;
            font-size: 1.1rem;
            color: #888888;
            margin-top: 50px;
        }

        /* Minimalist Card Design */
        .anime-card {
            display: flex;
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            gap: 24px;
            transition: border-color 0.2s, background 0.2s;
            margin-top: 50px;
        }

        .anime-card:hover {
            background: #111111;
            border-color: #444444;
        }

        .poster-frame {
            flex-shrink: 0;
            width: 180px;
            height: 260px;
            border-radius: 4px;
            overflow: hidden;
            background: #151515;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .anime-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .action-hint {
            color: #007aff;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Simple Subpage Overlay */
        .subpage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .subpage-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
        }

        .back-btn:hover {
            color: #ffffff;
        }

        /* Plain Action Button */
        .cry-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 40px;
        }

        .cry-btn:hover {
            opacity: 0.9;
        }

        /* Frameless Custom Player Layout */
        .video-container {
            display: none;
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 40px auto 0 auto;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000000;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Invisible layer that intercepts mobile touch inputs to block YouTube's native UI popups */
        .player-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }

        @media (max-width: 600px) {
            .anime-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-panel">Connecting to live anime stream...</div>

        <div id="anime-card" class="anime-card" style="display: none;" onclick="openSubpage()">
            <div class="poster-frame">
                <img id="api-image" src="" alt="Cyberpunk Edgerunners">
            </div>
            <div class="card-info">
                <h2 class="anime-title">Cyberpunk Edgerunners</h2>
                <div class="action-hint">Click to view page →</div>
            </div>
        </div>
    </div>

    <div id="details-subpage" class="subpage">
        <div class="subpage-content">
            <button class="back-btn" onclick="closeSubpage()">← Back</button>
            
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Cyberpunk Edgerunners</h1>
            
            <button id="cry-action-btn" class="cry-btn" onclick="playCleanVideo()">Make Me Cry</button>
            
            <div id="player-wrapper" class="video-container">
                <div class="player-shield"></div>
                <div id="video-target"></div>
            </div>
        </div>
    </div>

    <script>
        const VIDEO_ID = "KvMY1uzSC1E"; 

        document.addEventListener("DOMContentLoaded", () => {
            fetchAnimeData();
        });

        // Pulls exclusively through Kitsu Open API for the artwork asset sequence
        async function fetchAnimeData() {
            try {
                const response = await fetch('https://kitsu.io/api/edge/anime?filter[slug]=cyberpunk-edgerunners');
                if (!response.ok) throw new Error('Network fault');
                
                const json = await response.json();
                const anime = json.data[0].attributes;

                // Set the poster image source
                document.getElementById('api-image').src = anime.posterImage.medium;
                
                // Hide loading message and reveal the clean card structure
                document.getElementById('loading-panel').style.display = 'none';
                document.getElementById('anime-card').style.display = 'flex';
            } catch (err) {
                document.getElementById('loading-panel').innerText = 'Failed to process anime database asset data sequence.';
                console.error(err);
            }
        }

        function openSubpage() {
            document.getElementById('details-subpage').style.display = 'block';
        }

        function closeSubpage() {
            document.getElementById('details-subpage').style.display = 'none';
            document.getElementById('video-target').innerHTML = '';
            document.getElementById('player-wrapper').style.display = 'none';
            document.getElementById('cry-action-btn').style.display = 'inline-block';
        }

        function playCleanVideo() {
            document.getElementById('cry-action-btn').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';

            // Custom parameter flags to disable standard player chrome, info text, and pause panels
            document.getElementById('video-target').innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&fs=0&disablekb=1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        }
    </script>
</body>
</html>
