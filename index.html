<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIGHT_CITY_NET_NODE_v4.02</title>
    <style>
        /* Cyberpunk Terminal Aesthetics */
        :root {
            --neon-cyan: #00f0ff;
            --neon-yellow: #fcee0a;
            --neon-magenta: #ff0055;
            --dark-bg: #030308;
            --panel-bg: rgba(10, 10, 20, 0.85);
            --crt-green: #39ff14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-cyan);
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            padding: 20px;
        }

        /* Scanline CRT overlay effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 99999;
            opacity: 0.6;
            pointer-events: none;
        }

        header {
            border: 2px solid var(--neon-yellow);
            padding: 15px;
            margin-bottom: 30px;
            background: var(--panel-bg);
            position: relative;
            clip-path: polygon(0 0, 95% 0, 100% 40%, 100% 100%, 5% 100%, 0% 60%);
        }

        header h1 {
            color: var(--neon-yellow);
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .system-status {
            font-size: 0.8rem;
            color: var(--neon-magenta);
            margin-top: 5px;
        }

        /* Unique Grid Interface Layout */
        .gui-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Custom Interactive OS Card */
        .cyber-card {
            background: var(--panel-bg);
            border-left: 5px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-cyan);
            border-top: 2px solid var(--neon-cyan);
            border-bottom: 15px solid var(--neon-cyan);
            padding: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        @media(min-width: 768px) {
            .cyber-card {
                flex-direction: row;
            }
        }

        .cyber-card:hover {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transform: scale(1.01);
            background: rgba(15, 25, 45, 0.9);
        }

        .poster-frame {
            border: 1px dashed var(--neon-cyan);
            padding: 5px;
            width: 100%;
            max-width: 220px;
            height: 310px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            margin: 0 auto;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-metadata {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .anime-title {
            color: var(--neon-yellow);
            font-size: 1.5rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(252, 238, 10, 0.3);
            padding-bottom: 5px;
        }

        .synopsis-preview {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #b0d0d8;
            margin-bottom: 15px;
        }

        .click-prompt {
            font-weight: bold;
            color: var(--neon-magenta);
            animation: blink 1s infinite alternate;
        }

        /* Overlay Interface Screen */
        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 8, 0.98);
            z-index: 1000;
            padding: 30px 20px;
            overflow-y: auto;
        }

        .overlay-content {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid var(--neon-magenta);
            background: var(--panel-bg);
            padding: 25px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta);
            padding: 5px 10px;
            cursor: pointer;
        }

        .close-btn:hover {
            background: var(--neon-magenta);
            color: #000;
        }

        /* Media Player GUI Panel */
        .player-panel {
            margin-top: 20px;
            border: 1px solid rgba(0, 240, 255, 0.4);
            background: #000;
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            display: none;
        }

        .player-panel iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* Custom GUI Button */
        .cry-trigger-btn {
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            margin-top: 20px;
            position: relative;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        .cry-trigger-btn:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 15px var(--neon-magenta);
        }

        .cry-trigger-btn:active {
            transform: scale(0.98);
        }

        /* Diagnostic Loading Indicator */
        .loading-signal {
            font-size: 1.2rem;
            text-align: center;
            padding: 5px;
            color: var(--neon-yellow);
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>NIGHT_CITY_NET_NODE // v4.02</h1>
        <div class="system-status">SYS_STATUS: ACTIVE // TARGET: CYBERPUNK_EDGERUNNERS</div>
    </header>

    <div class="gui-container">
        <div id="loading-panel" class="loading-signal">INITIALIZING JIKAN_API DATA STREAM...</div>
        
        <div id="anime-card" class="cyber-card" style="display: none;" onclick="openTerminalView()">
            <div class="poster-frame">
                <img id="api-image" src="" alt="Data Stream Target">
            </div>
            <div class="card-metadata">
                <div>
                    <h2 class="anime-title" id="api-title">FETCHING ID...</h2>
                    <p class="synopsis-preview" id="api-synopsis">Decoding localized synopsis matrix from remote node network coordinates...</p>
                </div>
                <div class="click-prompt">[ ACCESS DATA NODE ]</div>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="overlay-screen">
        <div class="overlay-content">
            <button class="close-btn" onclick="closeTerminalView()">[ DISCONNECT ]</button>
            <h2 id="modal-title" style="color: var(--neon-magenta); margin-bottom: 15px;">DATA CONSOLE</h2>
            <p id="modal-desc" style="color: #b0d0d8; font-size: 0.95rem; line-height: 1.5;"></p>
            
            <button id="cry-btn" class="cry-trigger-btn" onclick="engageEmotionalCore()">MAKE ME CRY</button>
            
            <div id="video-wrapper" class="player-panel">
                <div id="youtube-frame-placeholder"></div>
            </div>
        </div>
    </div>

    <script>
        // Target Media Resource Configuration
        const VIDEO_ID = "KvMY1uzSC1E"; // Derived from custom youtube reference url
        let animeDataCache = null;

        // Life Cycle Entry Initialization Hook
        document.addEventListener("DOMContentLoaded", () => {
            fetchEdgerunnersMetadata();
        });

        // Safe vanilla non-ai API asynchronous controller utilizing free public Jikan node
        async function fetchEdgerunnersMetadata() {
            try {
                // Querying MyAnimeList ID 50265 (Cyberpunk: Edgerunners) via official Jikan v4 endpoints
                const response = await fetch('https://api.jikan.moe/v4/anime/50265');
                if (!response.ok) throw new Error('Network sequence aborted by remote host.');
                
                const json = await response.json();
                animeDataCache = json.data;

                // Populate custom layout structures safely
                document.getElementById('api-image').src = animeDataCache.images.jpg.large_image_url;
                document.getElementById('api-title').innerText = animeDataCache.title.toUpperCase();
                document.getElementById('api-synopsis').innerText = animeDataCache.synopsis.substring(0, 180) + "...";
                
                // Toggle element states safely
                document.getElementById('loading-panel').style.display = 'none';
                document.getElementById('anime-card').style.display = 'flex';
            } catch (error) {
                console.error('API Stream Exception:', error);
                document.getElementById('loading-panel').innerText = 'CRITICAL ERROR: DATA CONFLICT ENCOUNTERED ON ENDPOINT REQUEST';
            }
        }

        // GUI Control functions
        function openTerminalView() {
            if(!animeDataCache) return;
            
            document.getElementById('modal-title').innerText = `DATA_ARCHIVE // ${animeDataCache.title.toUpperCase()}`;
            document.getElementById('modal-desc').innerText = animeDataCache.synopsis;
            document.getElementById('terminal-screen').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Lock base screen layers
        }

        function closeTerminalView() {
            document.getElementById('terminal-screen').style.display = 'none';
            document.body.style.overflow = 'auto'; // Release window scroll parameters
            
            // Unload media content to accurately clean up ongoing background processes or sound structures
            document.getElementById('youtube-frame-placeholder').innerHTML = '';
            document.getElementById('video-wrapper').style.display = 'none';
            document.getElementById('cry-btn').style.display = 'block';
        }

        // Custom action state mapping initialization
        function engageEmotionalCore() {
            // Conceal old action node component safely
            document.getElementById('cry-btn').style.display = 'none';
            
            // Expose the native display panel frame safely
            const wrapper = document.getElementById('video-wrapper');
            wrapper.style.display = 'block';

            // Programmatically establish sandboxed container properties with absolute parameters
            // Plays the music video: “I Really Want to Stay At Your House” by Rosa Walton
            document.getElementById('youtube-frame-placeholder').innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&rel=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        }
    </script>
</body>
</html>
