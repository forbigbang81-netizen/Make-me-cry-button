<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Edgerunners Portal</title>
    <style>
        /* Minimalist All-Black Canvas */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        #loading-panel {
            text-align: center;
            font-size: 1.1rem;
            color: #666666;
            margin-top: 50px;
        }

        /* Hero Card Node */
        .anime-card {
            display: flex;
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            gap: 24px;
            transition: border-color 0.2s, background 0.2s;
            margin-top: 50px;
        }

        .anime-card:hover {
            background: #0c0c0c;
            border-color: #333333;
        }

        .poster-frame {
            flex-shrink: 0;
            width: 180px;
            height: 260px;
            border-radius: 4px;
            overflow: hidden;
            background: #111111;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .anime-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .action-hint {
            color: #007aff;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Seamless Subpage Overlay Layout */
        .subpage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .subpage-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888888;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
        }

        .back-btn:hover {
            color: #ffffff;
        }

        /* Plain Action Button */
        .cry-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 40px;
        }

        .cry-btn:hover {
            opacity: 0.9;
        }

        /* Native HTML5 Frameless Player Frame */
        .video-container {
            display: none;
            width: 100%;
            max-width: 800px;
            margin: 40px auto 0 auto;
            background: #000000;
            border-radius: 6px;
            overflow: hidden;
        }

        /* Eliminates all surrounding visual wrapper elements */
        video.custom-player {
            width: 100%;
            height: auto;
            display: block;
            outline: none;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-panel">Connecting to data stream...</div>

        <div id="anime-card" class="anime-card" style="display: none;" onclick="openSubpage()">
            <div class="poster-frame">
                <img id="api-image" src="" alt="Cyberpunk Edgerunners">
            </div>
            <div class="card-info">
                <h2 class="anime-title">Cyberpunk Edgerunners</h2>
                <div class="action-hint">Click to view page →</div>
            </div>
        </div>
    </div>

    <div id="details-subpage" class="subpage">
        <div class="subpage-content">
            <button class="back-btn" onclick="closeSubpage()">← Back</button>
            
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Cyberpunk Edgerunners</h1>
            
            <button id="cry-action-btn" class="cry-btn" onclick="playCleanVideo()">Make Me Cry</button>
            
            <div id="player-wrapper" class="video-container">
                <video id="native-video-node" class="custom-player" controls sandbox></video>
            </div>
        </div>
    </div>

    <script>
        // High-quality, direct open-storage backup stream for "I Really Want to Stay At Your House" 
        const DIRECT_STREAM_URL = "https://archive.org/download/cyberpunk-edgerunners-i-really-want-to-stay-at-your-house/Cyberpunk%3A%20Edgerunners%20%7C%20%E2%80%9CI%20Really%20Want%20to%20Stay%20At%20Your%20House%E2%80%9D%20by%20Rosa%20Walton%20%7C%20Music%20Video.mp4";

        document.addEventListener("DOMContentLoaded", () => {
            fetchPosterAsset();
        });

        // Pulls exclusively through Kitsu Open API to load the correct cover art
        async function fetchPosterAsset() {
            try {
                const response = await fetch('https://kitsu.io/api/edge/anime?filter[slug]=cyberpunk-edgerunners');
                if (!response.ok) throw new Error('API line disconnected');
                
                const json = await response.json();
                const animeData = json.data[0].attributes;

                // Load image directly from secure storage mirror
                document.getElementById('api-image').src = animeData.posterImage.medium;
                
                // Toggle view blocks
                document.getElementById('loading-panel').style.display = 'none';
                document.getElementById('anime-card').style.display = 'flex';
            } catch (err) {
                document.getElementById('loading-panel').innerText = 'Failed to load Cyberpunk Edgerunners data.';
                console.error(err);
            }
        }

        function openSubpage() {
            document.getElementById('details-subpage').style.display = 'block';
        }

        function closeSubpage() {
            document.getElementById('details-subpage').style.display = 'none';
            
            // Clean up running player instance entirely to prevent background audio bleed
            const videoPlayer = document.getElementById('native-video-node');
            videoPlayer.pause();
            videoPlayer.src = "";
            videoPlayer.load();

            document.getElementById('player-wrapper').style.display = 'none';
            document.getElementById('cry-action-btn').style.display = 'inline-block';
        }

        function playCleanVideo() {
            document.getElementById('cry-action-btn').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';

            const videoPlayer = document.getElementById('native-video-node');
            videoPlayer.src = DIRECT_STREAM_URL;
            videoPlayer.load();
            videoPlayer.play().catch(error => {
                console.log("Autoplay blocked by browser policy. Interaction required.");
            });
        }
    </script>
</body>
</html>
